name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: # ← これを追加することで、GitHubのサイトからボタン一つで手動デプロイも可能になります

permissions:
  contents: read
  pages: write
  id-token: write

# Node.js 24を強制的に使用する設定を追加
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 最新のNode.jsを使用
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # 「environment」の指定を削除してエラーを回避
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
